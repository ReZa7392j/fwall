# /etc/fwall/fwall.conf
# fwall configuration file
# Changes take effect on next: sudo fwall start

[policy]
# Default action for incoming traffic not matching any rule
# Options: allow | deny
default_incoming = deny

# Default action for outgoing traffic
# Options: allow | deny
default_incoming   = deny
default_outgoing   = allow
default_forwarding = deny

[logging]
# Enable or disable audit logging
# Options: true | false
enabled = true

# Log verbosity level
# Options: debug | info | warn | error
level = info

# Path to log file
path = /var/log/fwall.log

[engine]
# Firewall backend (nftables support planned for future)
# Options: iptables
backend = iptables
